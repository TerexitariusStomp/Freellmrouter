# =============================================================================
# Free LLM Router — Hermes Integration Config
# =============================================================================
# Provider configuration for quality-tier routing between 24 free LLM providers.
# Mirrors Freellmrouter's ProviderRegistry, ProviderScorer, and HealthMonitor.
#
# Architecture:
#   ProviderRegistry  — 24 providers, 4 quality tiers (S+/A/B/C)
#   ProviderScorer    — multi-factor scoring (credit + capability + speed + health)
#   QuotaManager      — SQLite request/failure tracking
#   HealthMonitor     — Circuit breaker: closed → half-open → open (3+ failures)
#   TaskClassifier   — keyword-based → capability match
# =============================================================================

routing:
  # Primary model (Hermes default)
  primary:
    model: "qwen/qwen3.6-plus-preview:free"
    provider: "openrouter"
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"

  # Scoring weights (from Freellmrouter provider_scorer.py)
  scoring:
    credit_weight: 0.40        # Remaining quota/credits
    capability_weight: 0.35     # Task-specific capability match
    speed_weight: 0.25          # RPM / response time
    health_weight: 0.0          # Circuit breaker health (unused in static config)
    policy_weight: 0.0          # Content policy compliance
    preference_weight: 0.0      # User-specified preference

  # Circuit breaker settings (from Freellmrouter health.py)
  circuit_breaker:
    failure_threshold: 3         # Consecutive failures before opening
    recovery_timeout: 300        # Seconds before half-open (5 min for 429 cooldown)
    success_threshold: 2         # Successes to close from half-open
    window_hours: 1              # How far back to count failures

  # Task classification (from Freellmrouter classifiers.py)
  task_types:
    general: "General conversation and Q&A"
    coding: "Code generation, debugging, development"
    reasoning: "Mathematical, logical, analytical reasoning"
    vision: "Image understanding and visual tasks"
    long: "Document processing, summarization, long-form"
    fast: "Real-time, low-latency applications"

